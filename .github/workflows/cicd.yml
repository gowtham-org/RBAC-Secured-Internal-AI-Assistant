name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_IMAGE }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1: CI — Test + Build + Push
  # Runs on GitHub's cloud servers
  # ─────────────────────────────────────────
  ci:
    name: 🧪 Test + 🐳 Build + Push
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest fastapi httpx chromadb streamlit

      - name: 🧪 Run tests
        run: pytest tests/ -v

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 2: CD — Deploy to Minikube
  # Runs on YOUR local machine via self-hosted runner
  # ─────────────────────────────────────────
  cd:
    name: 🚀 Deploy to Minikube
    runs-on: self-hosted
    needs: ci          # only runs if CI job passes

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔄 Pull new image into Minikube
        run: |
          eval $(minikube docker-env)
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: 🚀 Update backend deployment
        run: |
          kubectl set image deployment/rolechat-backend \
            backend=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n rolechat

      - name: ⏳ Wait for rollout to complete
        run: |
          kubectl rollout status deployment/rolechat-backend \
            -n rolechat \
            --timeout=120s

      - name: ✅ Verify pods are running
        run: kubectl get pods -n rolechat