apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args: ["tunnel", "--no-autoupdate", "run"]
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yml
              subPath: config.yml
            - name: creds
              mountPath: /etc/cloudflared/9bd01f73-78af-4b55-a16f-ae3e490b83a4.json
              subPath: 9bd01f73-78af-4b55-a16f-ae3e490b83a4.json
      volumes:
        - name: config
          secret:
            secretName: cloudflared-config
        - name: creds
          secret:
            secretName: cloudflared-creds